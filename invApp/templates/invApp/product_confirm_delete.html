{% extends "invApp/base.html" %}

{% block title %}Delete Product{% endblock %}

{% block content %}
    <h1 class="text-center">Are you sure you want to delete this product?</h1>
    <p class="text-center">Product: {{ product.name }} (ID: {{ product.id }})</p>
    <form method="POST" class="text-center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'product-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
